name: My workflow
on:
  push:
  workflow_run:
    workflows: ["Push Auth"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: 0 */6 * * *

concurrency:
  group: wbt
  cancel-in-progress: true

jobs:
  job:
    name: My Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Sync
        run: rclone sync cloud:tokens ./tokens

      - uses: AnimMouse/setup-ffmpeg@v1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Environment
        run: |
          echo "${{ secrets.ENV }}" | base64 -d > .env

      - name: Bun
        run: bun install;bun run .

      - name: CI
        if: ${{ success() }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/dpl.yml/dispatches \
            -d '{"ref":"main"}'
