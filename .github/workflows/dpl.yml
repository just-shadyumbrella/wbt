name: My workflow
on:
  push:
  workflow_run:
    workflows: ["Push Auth"]
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: 0 */6 * * *

concurrency:
  group: wbt_dev
  cancel-in-progress: true

jobs:
  job:
    name: My Job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Sync
        run: rclone sync cloud:tokens ./tokens

      - uses: AnimMouse/setup-ffmpeg@v1
        
      - uses: AnimMouse/setup-yt-dlp@v3
        

      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          install-chromedriver: true
      - run: |
          echo ${{ steps.setup-chrome.outputs.chrome-path }} > chrome-path.txt

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Environment
        run: |
          echo "${{ secrets.ENV_DEV }}" | base64 -d > .env

      - name: Bun
        run: bun install;bun run .
